<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <h1 class="logo">SALAM</h1>
            <nav>
                <ul>
                    <li>Agendar Serviço</li>
                    <li>Avaliar Profissionais</li>
                    <li>Cupons</li>
                    <li>Agendamentos</li>
                </ul>
            </nav>
        </aside>

        <!-- Área Principal -->
        <main class="main-view">
            <!-- Cabeçalho Superior -->
            <header class="top-nav">
                <ul class="nav-center">
                    <li>Serviços</li>
                    <li>Planos</li>
                </ul>
                <ul class="nav-right">
                    <li>Cadastro</li>
                </ul>
            </header>

            <!-- Conteúdo Dinâmico -->
            <section class="content" id="promo-container">
                <!-- O JavaScript injetará o card da promoção aqui -->
                <p>Carregando promoções...</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
