<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALAM - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-nude">

    <div class="auth-wrapper">
        <h1 class="auth-title">Cadastro</h1>
        <div class="auth-card">
            <form id="cadastroForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Insira seu email" required>
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="insira sua senha" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword">Mostrar senha</label>
                </div>

                <div class="form-group">
                    <label>Data de nascimento</label>
                    <input type="text" id="dob" placeholder="insira sua data de nascimento" required>
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="phone" placeholder="insira seu número de telefone" required>
                </div>

                <button type="submit" class="btn-dark">Registrar-se</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
